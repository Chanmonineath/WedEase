<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSVP - Wedding Invitation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      /* default bg — overridden by theme */
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      transition: background 0.4s ease;
    }

    /* ── THEMES ────────────────────────────────────────────── */
    body.theme-classic  { background: linear-gradient(135deg, #6f3054 0%, #a2437c 100%); }
    body.theme-romantic { background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); }
    body.theme-garden   { background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%); }
    body.theme-beach    { background: linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%); }
    body.theme-boho     { background: linear-gradient(135deg, #c79081 0%, #dfa579 100%); }
    body.theme-luxury   { background: linear-gradient(135deg, #373b44 0%, #4286f4 100%); }
    body.theme-modern   { background: linear-gradient(135deg, #373b44 0%, #6a6a6a 100%); }
    body.theme-vintage  { background: linear-gradient(135deg, #8B4513 0%, #cd853f 100%); }
    body.theme-pastel   { background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); }
    body.theme-fairytale { background: linear-gradient(135deg, #c471ed 0%, #f64f59 100%); }
    body.theme-elegant  { background: linear-gradient(135deg, #3a3a3a 0%, #757575 100%); }
    body.theme-forest   { background: linear-gradient(135deg, #134e5e 0%, #71b280 100%); }
    body.theme-sunset   { background: linear-gradient(135deg, #f83600 0%, #f9d423 100%); }
    body.theme-barn     { background: linear-gradient(135deg, #5c3317 0%, #a0522d 100%); }
    body.theme-industrial { background: linear-gradient(135deg, #3d3d3d 0%, #7f7f7f 100%); }
    body.theme-chinese  { background: linear-gradient(135deg, #cc0000 0%, #ff6600 100%); }
    body.theme-indian   { background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%); }
    body.theme-french   { background: linear-gradient(135deg, #8e9eab 0%, #eef2f3 100%); }

    /* header accent per theme */
    .invitation-header                  { background: linear-gradient(135deg, #a2437c, #6f3054); }
    body.theme-romantic  .invitation-header { background: linear-gradient(135deg, #e91e8c, #c2185b); }
    body.theme-garden    .invitation-header { background: linear-gradient(135deg, #2e7d32, #388e3c); }
    body.theme-beach     .invitation-header { background: linear-gradient(135deg, #0277bd, #0288d1); }
    body.theme-boho      .invitation-header { background: linear-gradient(135deg, #8d6e63, #a1887f); }
    body.theme-luxury    .invitation-header { background: linear-gradient(135deg, #212121, #424242); }
    body.theme-modern    .invitation-header { background: linear-gradient(135deg, #263238, #455a64); }
    body.theme-vintage   .invitation-header { background: linear-gradient(135deg, #5d4037, #795548); }
    body.theme-pastel    .invitation-header { background: linear-gradient(135deg, #ab47bc, #7b1fa2); }
    body.theme-fairytale .invitation-header { background: linear-gradient(135deg, #7b1fa2, #6a1b9a); }
    body.theme-elegant   .invitation-header { background: linear-gradient(135deg, #212121, #424242); }
    body.theme-forest    .invitation-header { background: linear-gradient(135deg, #1b5e20, #2e7d32); }
    body.theme-sunset    .invitation-header { background: linear-gradient(135deg, #bf360c, #e64a19); }
    body.theme-barn      .invitation-header { background: linear-gradient(135deg, #4e342e, #6d4c41); }
    body.theme-industrial .invitation-header { background: linear-gradient(135deg, #212121, #616161); }
    body.theme-chinese   .invitation-header { background: linear-gradient(135deg, #b71c1c, #c62828); }
    body.theme-indian    .invitation-header { background: linear-gradient(135deg, #e65100, #ef6c00); }
    body.theme-french    .invitation-header { background: linear-gradient(135deg, #78909c, #90a4ae); }

    /* ── Card ─────────────────────────────────────────────── */
    .rsvp-container {
      max-width: 600px;
      width: 100%;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .invitation-header {
      color: white;
      padding: 40px 30px;
      text-align: center;
    }
    .invitation-header h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 3rem;
      margin-bottom: 8px;
    }
    .invitation-header p {
      font-family: 'Cormorant', serif;
      font-style: italic;
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .invitation-details {
      padding: 30px;
      background: #fef9fc;
    }
    .detail-item {
      margin-bottom: 16px;
      padding: 15px;
      background: white;
      border-radius: 12px;
      border: 1px solid #e0d5e3;
    }
    .detail-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #a2437c;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .detail-value {
      font-size: 1.05rem;
      color: #333;
      font-weight: 500;
    }
    .personal-message {
      background: linear-gradient(135deg,#fcf4fb,#fff);
      padding: 20px;
      border-radius: 12px;
      margin: 16px 0 0;
      font-style: italic;
      text-align: center;
      border-left: 4px solid #a2437c;
      color: #555;
      line-height: 1.6;
    }

    /* ── RSVP form ──────────────────────────────────────────── */
    .rsvp-form { padding: 30px; }
    .rsvp-form h3 {
      font-family: 'Great Vibes', cursive;
      font-size: 2rem;
      color: #a2437c;
      margin-bottom: 20px;
      text-align: center;
    }
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      margin-bottom: 6px;
      color: #6f3054;
      font-weight: 600;
      font-size: 0.88rem;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0d5e3;
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.3s ease;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #a2437c;
      box-shadow: 0 0 0 3px rgba(162,67,124,0.1);
    }
    .radio-group { display:flex; gap:20px; margin-top:10px; flex-wrap:wrap; }
    .radio-option { display:flex; align-items:center; gap:8px; cursor:pointer; }
    .radio-option input { width:auto; }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(45deg, #a2437c, #6f3054);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
    }
    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(162,67,124,0.4);
    }
    .submit-btn:disabled { opacity:0.6; cursor:not-allowed; }

    /* ── States ─────────────────────────────────────────────── */
    .loading {
      text-align:center; padding:60px; color:#a2437c;
    }
    .spinner {
      border:3px solid #f3e6f0; border-top:3px solid #a2437c;
      border-radius:50%; width:40px; height:40px;
      animation:spin 1s linear infinite; margin:0 auto 15px;
    }
    @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

    .success-message { text-align:center; padding:60px; }
    .success-message h2 { color:#28a745; margin-bottom:10px; font-size:1.8rem; }
    .success-message p  { color:#666; margin-top:10px; }

    .error-message {
      background:#f8d7da; color:#721c24;
      padding:15px; border-radius:10px;
      margin-bottom:20px; text-align:center;
    }
    .hidden { display:none; }

    /* guest name greeting */
    .guest-greeting {
      text-align:center;
      padding:12px 20px;
      background:#fcf4fb;
      font-family:'Cormorant', serif;
      font-size:1.1rem;
      color:#6f3054;
      border-bottom:1px solid #f0e0ef;
    }
  </style>
</head>
<body>
  <div class="rsvp-container" id="rsvpContainer">

    <!-- Loading -->
    <div id="loadingState" class="loading">
      <div class="spinner"></div>
      <p>Loading your invitation...</p>
    </div>

    <!-- Invitation content -->
    <div id="invitationContent" class="hidden">
      <div class="invitation-header">
        <h1>You're Invited!</h1>
        <p>Please join us to celebrate</p>
      </div>

      <div class="guest-greeting" id="guestGreeting"></div>

      <div class="invitation-details">
        <div class="detail-item">
          <div class="detail-label">Couple</div>
          <div class="detail-value" id="coupleNames">—</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Date</div>
          <div class="detail-value" id="eventDate">—</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Venue</div>
          <div class="detail-value" id="venue">—</div>
        </div>
        <div class="personal-message" id="personalMessage"></div>
      </div>

      <div class="rsvp-form">
        <h3>RSVP</h3>
        <div id="errorMessage" class="error-message hidden"></div>

        <div class="form-group">
          <label>Will you be attending?</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="rsvpStatus" value="confirmed"> ✓ Yes, I'll be there!
            </label>
            <label class="radio-option">
              <input type="radio" name="rsvpStatus" value="declined"> ✗ Sorry, I can't make it
            </label>
          </div>
        </div>

        <div class="form-group" id="guestCountGroup">
          <label>Number of guests (including yourself)</label>
          <input type="number" id="guestCount" min="1" max="10" value="1">
        </div>

        <div class="form-group">
          <label>Dietary Restrictions</label>
          <textarea id="dietaryRestrictions" rows="2" placeholder="Any allergies or dietary requirements?"></textarea>
        </div>

        <div class="form-group">
          <label>Additional Notes</label>
          <textarea id="notes" rows="2" placeholder="Any special requests or messages for the couple?"></textarea>
        </div>

        <button class="submit-btn" id="submitBtn" onclick="submitRSVP()">Submit RSVP</button>
      </div>
    </div>

    <!-- Success -->
    <div id="successState" class="success-message hidden">
      <div style="font-size:3rem;margin-bottom:1rem;">🎉</div>
      <h2>Thank You!</h2>
      <p>Your response has been recorded.</p>
      <p style="margin-top:16px;color:#999;">We can't wait to celebrate with you!</p>
    </div>

  </div>

  <script>
    const API_URL = "http://localhost:5000/api";
    let invitationToken = null;

    function getTokenFromURL() {
      return new URLSearchParams(window.location.search).get('token');
    }

    // Apply theme class to body
    function applyTheme(theme) {
      const validThemes = [
        'classic','romantic','garden','beach','boho','luxury','modern',
        'vintage','pastel','fairytale','elegant','forest','sunset','barn',
        'industrial','chinese','indian','french'
      ];
      const t = (theme || 'classic').toLowerCase().replace(/\s+/g, '');
      // match partial names (e.g. "garden wedding" → "garden")
      const matched = validThemes.find(v => t.includes(v)) || 'classic';
      document.body.className = `theme-${matched}`;
    }

    async function loadInvitation() {
      const token = getTokenFromURL();
      if (!token) {
        showError("Invalid invitation link. Please check your email.");
        hideLoading();
        return;
      }
      invitationToken = token;

      try {
        const response = await fetch(`${API_URL}/invitation-guests/public/${encodeURIComponent(token)}`);
        const data = await response.json();

        if (data.success && data.data) {
          displayInvitation(data.data);
        } else {
          showError(data.message || "Invalid or expired invitation link.");
        }
      } catch (error) {
        console.error("Error loading invitation:", error);
        showError("Failed to load invitation. Please check your connection and try again.");
      } finally {
        hideLoading();
      }
    }

    function hideLoading() {
      document.getElementById('loadingState').classList.add('hidden');
    }

    function displayInvitation(data) {
      // Apply theme styling
      applyTheme(data.theme);

      // Guest greeting
      const greeting = document.getElementById('guestGreeting');
      if (data.name) greeting.textContent = `Dear ${data.name},`;

      // Couple names
      document.getElementById('coupleNames').textContent = data.coupleNames || "John & Jane";

      // Date
      if (data.eventDate) {
        const d = new Date(data.eventDate);
        document.getElementById('eventDate').textContent = d.toLocaleDateString('en-US', {
          weekday:'long', year:'numeric', month:'long', day:'numeric'
        });
      } else {
        document.getElementById('eventDate').textContent = "Date to be announced";
      }

      // Venue & message
      document.getElementById('venue').textContent = data.venue || "Venue to be announced";
      document.getElementById('personalMessage').textContent =
        data.message || "Join us as we celebrate our special day!";

      // If already responded, skip straight to success
      if (data.rsvpStatus && data.rsvpStatus !== 'pending') {
        document.getElementById('successState').classList.remove('hidden');
        return;
      }

      document.getElementById('invitationContent').classList.remove('hidden');
    }

    function showError(message) {
      document.getElementById('invitationContent').classList.remove('hidden');
      const el = document.getElementById('errorMessage');
      el.textContent = message;
      el.classList.remove('hidden');
    }

    async function submitRSVP() {
      const selected = document.querySelector('input[name="rsvpStatus"]:checked');
      if (!selected) { alert("Please select whether you'll be attending"); return; }

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting...";

      try {
        const response = await fetch(
          `${API_URL}/invitation-guests/public/rsvp/${encodeURIComponent(invitationToken)}`,
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              rsvpStatus:           selected.value,
              guestCount:           parseInt(document.getElementById('guestCount').value) || 1,
              dietaryRestrictions:  document.getElementById('dietaryRestrictions').value,
              notes:                document.getElementById('notes').value,
            })
          }
        );
        const data = await response.json();
        if (data.success) {
          document.getElementById('invitationContent').classList.add('hidden');
          document.getElementById('successState').classList.remove('hidden');
        } else {
          alert(data.message || "Failed to submit RSVP. Please try again.");
          submitBtn.disabled = false;
          submitBtn.textContent = "Submit RSVP";
        }
      } catch (error) {
        console.error("Error submitting RSVP:", error);
        alert("Failed to submit RSVP. Please try again.");
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit RSVP";
      }
    }

    // Hide guest count when declining
    document.addEventListener('DOMContentLoaded', () => {
      loadInvitation();
      document.querySelectorAll('input[name="rsvpStatus"]').forEach(r => {
        r.addEventListener('change', e => {
          document.getElementById('guestCountGroup').style.display =
            e.target.value === 'declined' ? 'none' : 'block';
        });
      });
    });

    window.submitRSVP = submitRSVP;
  </script>
</body>
</html>
